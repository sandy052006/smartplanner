<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — SmartPlanner</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
    :root {
        --primary: #6366f1; --primary-dark: #4f46e5; --accent: #10b981;
        --bg: #f0f4ff; --surface: #ffffff; --surface-2: #f8faff;
        --border: rgba(99,102,241,0.15); --text: #1e293b;
        --text-muted: #64748b; --text-light: #94a3b8;
        --radius: 14px; --radius-sm: 8px;
        --transition: 0.22s cubic-bezier(0.4,0,0.2,1);
    }
    [data-theme="dark"] {
        --bg: #0d1117; --surface: #161b22; --surface-2: #1c2128;
        --border: rgba(99,102,241,0.25); --text: #e6edf3;
        --text-muted: #8b949e; --text-light: #484f58;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
        font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text);
        min-height: 100vh; display: flex; align-items: center; justify-content: center;
        padding: 2rem 1rem; transition: background var(--transition), color var(--transition);
    }
    .auth-container {
        width: 100%; max-width: 420px; background: var(--surface);
        border: 1px solid var(--border); border-radius: var(--radius);
        padding: 2.5rem 2rem; box-shadow: 0 16px 48px rgba(0,0,0,0.12);
    }
    .brand {
        text-align: center; font-size: 2rem; font-weight: 800;
        background: linear-gradient(135deg, #6366f1, #10b981);
        -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        background-clip: text; margin-bottom: 0.5rem;
    }
    .auth-title { font-size: 1.2rem; font-weight: 700; text-align:center; margin-bottom: 0.25rem; }
    .auth-sub { text-align:center; color: var(--text-muted); font-size: 0.875rem; margin-bottom: 2rem; }
    .form-group { margin-bottom: 1.1rem; }
    .form-label { display:block; font-size:0.82rem; font-weight:600; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:0.4rem; }
    .form-input {
        width: 100%; background: var(--surface-2); border: 1.5px solid var(--border);
        border-radius: var(--radius-sm); color: var(--text);
        padding: 0.7rem 1rem; font-size: 0.95rem; font-family: inherit;
        transition: all var(--transition);
    }
    .form-input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(99,102,241,0.2); }
    .form-input::placeholder { color: var(--text-light); }
    .btn-primary {
        width: 100%; background: linear-gradient(135deg, #6366f1, #4f46e5);
        color: white; border: none; border-radius: var(--radius-sm);
        padding: 0.75rem 1rem; font-size: 1rem; font-weight: 700;
        font-family: inherit; cursor: pointer; margin-top: 0.75rem;
        transition: all var(--transition); box-shadow: 0 4px 16px rgba(99,102,241,0.3);
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(99,102,241,0.4); }
    .error-box {
        background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.2);
        border-radius: var(--radius-sm); padding: 0.875rem; margin-bottom: 1rem;
        font-size: 0.875rem; color: #ef4444;
    }
    .auth-footer { text-align:center; margin-top: 1.5rem; font-size: 0.875rem; color: var(--text-muted); }
    .auth-footer a { color: var(--primary); font-weight: 600; text-decoration: none; }
    .auth-footer a:hover { text-decoration: underline; }
    .theme-btns { position: fixed; top: 1rem; right: 1rem; display: flex; gap: 0.5rem; }
    .theme-btn { background: var(--surface); border: 1px solid var(--border); border-radius: 50%; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 1rem; }
    .divider-line { height:1px; background:var(--border); margin:1.25rem 0; }
    </style>
</head>
<body>
    <div class="theme-btns">
        <button class="theme-btn" onclick="toggleTheme()">🌙</button>
    </div>

    <div class="auth-container">
        <div class="brand">SmartPlanner</div>
        <h1 class="auth-title">Welcome Back</h1>
        <p class="auth-sub">Sign in to your financial dashboard 📊</p>

        {% if form.errors %}
        <div class="error-box">
            <strong>❌ Login failed:</strong> Your username or password didn't match. Please try again.
        </div>
        {% endif %}

        <form method="post" action="{% url 'login' %}">
            {% csrf_token %}

            <div class="form-group">
                <label class="form-label" for="id_username">Username</label>
                <input type="text" name="username" id="id_username" class="form-input"
                       placeholder="Enter your username" autofocus autocomplete="username">
            </div>

            <div class="form-group">
                <label class="form-label" for="id_password">Password</label>
                <input type="password" name="password" id="id_password" class="form-input"
                       placeholder="Enter your password" autocomplete="current-password">
            </div>

            <button type="submit" class="btn-primary">🔐 Log In</button>
        </form>

        <div class="divider-line"></div>

        <p class="auth-footer">
            Don't have an account?
            <a href="{% url 'planner:signup' %}">Sign up now →</a>
        </p>
    </div>

    <script>
    const t = localStorage.getItem('sp_theme') || 'light';
    document.documentElement.setAttribute('data-theme', t);
    function toggleTheme() {
        const curr = document.documentElement.getAttribute('data-theme');
        const next = curr === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        localStorage.setItem('sp_theme', next);
    }
    </script>
</body>
</html>
